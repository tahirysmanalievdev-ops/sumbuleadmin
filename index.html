<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sumbule — Панель управления</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f1e5ac;
      --gold-dark: #996515;
      --cream: #faf9f6;
      --cream-dark: #f0ede5;
      --dark: #12100e;
      --dark2: #1a1714;
      --dark3: #24201c;
      --text-light: #e0d5c0;
      --text-muted: #9c8e7a;
      --green: #4caf80;
      --red: #c0504d;
      --blue: #5b9bd5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.3;
    }

    /* LOGIN */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      flex-direction: column;
      gap: 8px;
    }
    .login-box {
      background: var(--dark2);
      border: 1px solid rgba(212,175,55,0.2);
      padding: 56px 48px;
      width: 380px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .login-box input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid rgba(212,175,55,0.15);
      color: var(--cream);
      padding: 14px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 14px;
    }
    .login-box input:focus { border-color: rgba(212,175,55,0.5); }
    .login-btn {
      width: 100%;
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 14px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 6px;
    }
    .login-btn:hover { background: var(--gold-light); }
    .login-error {
      color: var(--red);
      font-size: 11px;
      letter-spacing: 0.1em;
      margin-top: 12px;
      min-height: 16px;
    }

    /* MAIN LAYOUT */
    #app { display: none; }
    header {
      background: rgba(18,16,14,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,175,55,0.12);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .header-badge {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--dark3);
      border: 1px solid rgba(212,175,55,0.1);
      padding: 6px 14px;
    }
    .logout-btn {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: 1px solid rgba(212,175,55,0.15);
      padding: 6px 16px;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      transition: all 0.3s;
    }
    .logout-btn:hover { color: var(--gold); border-color: rgba(212,175,55,0.4); }

    main { padding: 40px; max-width: 1400px; margin: 0 auto; }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--dark2);
      border: 1px solid rgba(212,175,55,0.1);
      padding: 28px 24px;
      transition: border-color 0.3s;
    }
    .stat-card:hover { border-color: rgba(212,175,55,0.3); }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* FILTERS */
    .filters-row {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-input, .filter-select {
      background: var(--dark2);
      border: 1px solid rgba(212,175,55,0.15);
      color: var(--cream);
      padding: 10px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.3s;
      min-width: 160px;
    }
    .filter-input:focus, .filter-select:focus { border-color: rgba(212,175,55,0.4); }
    .filter-select option { background: var(--dark2); }
    .filter-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      align-self: center;
    }
    .clear-btn {
      background: none;
      border: 1px solid rgba(212,175,55,0.15);
      color: var(--text-muted);
      padding: 10px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .clear-btn:hover { color: var(--gold); border-color: rgba(212,175,55,0.4); }
    .refresh-btn {
      background: var(--gold);
      border: none;
      color: var(--dark);
      padding: 10px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      margin-left: auto;
    }
    .refresh-btn:hover { background: var(--gold-light); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* TABLE */
    .table-wrap {
      background: var(--dark2);
      border: 1px solid rgba(212,175,55,0.1);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--dark3); }
    th {
      padding: 14px 20px;
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 400;
      border-bottom: 1px solid rgba(212,175,55,0.1);
      white-space: nowrap;
    }
    td {
      padding: 16px 20px;
      font-size: 13px;
      color: var(--text-light);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(212,175,55,0.03); }
    .td-name { font-weight: 400; color: var(--cream); }
    .td-phone { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--gold-light); }
    .td-service { max-width: 180px; }
    .td-notes { font-style: italic; color: var(--text-muted); font-size: 12px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-date { white-space: nowrap; }

    /* STATUS BADGE */
    .badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid;
      white-space: nowrap;
    }
    .badge-pending { color: #d4af37; border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.06); }
    .badge-confirmed { color: var(--green); border-color: rgba(76,175,128,0.4); background: rgba(76,175,128,0.06); }
    .badge-cancelled { color: var(--red); border-color: rgba(192,80,77,0.4); background: rgba(192,80,77,0.06); }

    /* ACTION BUTTONS */
    .actions { display: flex; gap: 8px; }
    .act-btn {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      background: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .act-confirm { color: var(--green); border-color: rgba(76,175,128,0.3); }
    .act-confirm:hover { background: rgba(76,175,128,0.1); }
    .act-cancel { color: var(--red); border-color: rgba(192,80,77,0.3); }
    .act-cancel:hover { background: rgba(192,80,77,0.1); }
    .act-delete { color: var(--text-muted); border-color: rgba(156,142,122,0.3); }
    .act-delete:hover { color: var(--red); border-color: rgba(192,80,77,0.3); background: rgba(192,80,77,0.06); }
    .act-wa { color: #25d366; border-color: rgba(37,211,102,0.3); }
    .act-wa:hover { background: rgba(37,211,102,0.08); }

    /* EMPTY / LOADING */
    .table-message {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(212,175,55,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--dark3);
      border: 1px solid rgba(212,175,55,0.2);
      color: var(--text-light);
      padding: 14px 24px;
      font-size: 12px;
      letter-spacing: 0.08em;
      z-index: 9998;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* MODAL */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(18,16,14,0.85);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--dark2);
      border: 1px solid rgba(212,175,55,0.2);
      padding: 40px;
      width: 460px;
      max-width: 90vw;
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold-light);
      margin-bottom: 12px;
      font-style: italic;
    }
    .modal-body { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 28px; }
    .modal-btns { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-cancel { background: none; border: 1px solid rgba(212,175,55,0.15); color: var(--text-muted); padding: 10px 20px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .modal-cancel:hover { border-color: rgba(212,175,55,0.4); color: var(--cream); }
    .modal-confirm-btn { background: var(--red); border: none; color: white; padding: 10px 24px; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .modal-confirm-btn:hover { background: #a03a38; }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      padding: 0 4px;
    }
    .pagination-info { font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); }
    .pagination-btns { display: flex; gap: 8px; }
    .page-btn {
      background: var(--dark2);
      border: 1px solid rgba(212,175,55,0.15);
      color: var(--text-muted);
      padding: 8px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) { color: var(--gold); border-color: rgba(212,175,55,0.4); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn.active { border-color: rgba(212,175,55,0.5); color: var(--gold); }

    @media (max-width: 768px) {
      main { padding: 20px; }
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      header { padding: 16px 20px; }
      .filters-row { flex-direction: column; align-items: stretch; }
      .refresh-btn { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- APP -->
<div id="app" style="display:block">
  <header>
    <div class="header-logo">Sumbule</div>
    <div class="header-right">
      <div class="header-badge">Панель управления</div>
    </div>
  </header>

  <main>
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Всего записей</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-pending" style="color:#d4af37">—</div>
        <div class="stat-label">Ожидают</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-confirmed" style="color:#4caf80">—</div>
        <div class="stat-label">Подтверждены</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-today">—</div>
        <div class="stat-label">Сегодня</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters-row">
      <span class="filter-label">Фильтр</span>
      <input type="text" class="filter-input" id="f-search" placeholder="Имя или телефон..." oninput="applyFilters()" />
      <input type="date" class="filter-input" id="f-date-filter" oninput="applyFilters()" style="min-width:160px" />
      <select class="filter-select" id="f-status-filter" onchange="applyFilters()">
        <option value="">Все статусы</option>
        <option value="pending">Ожидает</option>
        <option value="confirmed">Подтверждён</option>
        <option value="cancelled">Отменён</option>
      </select>
      <select class="filter-select" id="f-service-filter" onchange="applyFilters()">
        <option value="">Все услуги</option>
      </select>
      <button class="clear-btn" onclick="clearFilters()">Сбросить</button>
      <button class="refresh-btn" id="refresh-btn" onclick="loadBookings()">↻ Обновить</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Услуга</th>
            <th>Дата</th>
            <th>Время</th>
            <th>Примечания</th>
            <th>Статус</th>
            <th>Подано</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="bookings-tbody">
          <tr><td colspan="10"><div class="table-message"><div class="spinner"></div>Loading bookings...</div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="pagination">
      <div class="pagination-info" id="pagination-info"></div>
      <div class="pagination-btns" id="pagination-btns"></div>
    </div>
  </main>
</div>

<!-- DELETE CONFIRM MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Удалить запись</div>
    <div class="modal-body" id="modal-body-text">Вы уверены? Это действие нельзя отменить.</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Отмена</button>
      <button class="modal-confirm-btn" id="modal-confirm-btn">Удалить</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://ozesamfubunasujqfowv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96ZXNhbWZ1YnVuYXN1anFmb3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjA5ODMsImV4cCI6MjA4ODg5Njk4M30.SOBCCMFaj-B-toFxfA8c27B_ym02fLWdSzIHSh3cT7Y';

  let allBookings = [];
  let filtered = [];
  let currentPage = 1;
  const PER_PAGE = 20;

  // ── FETCH ─────────────────────────────────────────────────────────────
  async function loadBookings() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Загрузка...';
    setTableMsg('<div class="spinner"></div>Загрузка записей...');

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bookings?order=created_at.desc&limit=1000`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      if (!res.ok) throw new Error('Supabase error ' + res.status);
      allBookings = await res.json();

      // patch: add status field if not present
      allBookings = allBookings.map(b => ({ ...b, status: b.status || 'pending' }));

      populateServiceFilter();
      applyFilters();
      updateStats();
      showToast('Записи загружены');
    } catch (e) {
      setTableMsg('Не удалось загрузить записи. Проверьте подключение к Supabase.');
      showToast('Ошибка: ' + e.message);
    }
    btn.disabled = false;
    btn.textContent = '↻ Обновить';
  }

  // ── STATS ─────────────────────────────────────────────────────────────
  function updateStats() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('stat-total').textContent = allBookings.length;
    document.getElementById('stat-pending').textContent = allBookings.filter(b => (b.status||'pending') === 'pending').length;
    document.getElementById('stat-confirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
    document.getElementById('stat-today').textContent = allBookings.filter(b => b.date === today).length;
  }

  // ── SERVICE FILTER POPULATE ───────────────────────────────────────────
  function populateServiceFilter() {
    const sel = document.getElementById('f-service-filter');
    const current = sel.value;
    sel.innerHTML = '<option value="">Все услуги</option>';
    const services = [...new Set(allBookings.map(b => b.service).filter(Boolean))].sort();
    services.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      if (s === current) o.selected = true;
      sel.appendChild(o);
    });
  }

  // ── FILTERS ───────────────────────────────────────────────────────────
  function applyFilters() {
    const search = document.getElementById('f-search').value.toLowerCase();
    const date = document.getElementById('f-date-filter').value;
    const status = document.getElementById('f-status-filter').value;
    const service = document.getElementById('f-service-filter').value;

    filtered = allBookings.filter(b => {
      if (search && !((b.name||'').toLowerCase().includes(search) || (b.phone||'').includes(search))) return false;
      if (date && b.date !== date) return false;
      if (status && (b.status||'pending') !== status) return false;
      if (service && b.service !== service) return false;
      return true;
    });

    currentPage = 1;
    renderTable();
  }

  function clearFilters() {
    document.getElementById('f-search').value = '';
    document.getElementById('f-date-filter').value = '';
    document.getElementById('f-status-filter').value = '';
    document.getElementById('f-service-filter').value = '';
    applyFilters();
  }

  // ── RENDER ────────────────────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('bookings-tbody');
    if (!filtered.length) {
      setTableMsg('Записи не найдены.');
      document.getElementById('pagination-info').textContent = '';
      document.getElementById('pagination-btns').innerHTML = '';
      return;
    }

    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    const start = (currentPage - 1) * PER_PAGE;
    const page = filtered.slice(start, start + PER_PAGE);

    tbody.innerHTML = page.map((b, i) => {
      const status = b.status || 'pending';
      const idx = start + i + 1;
      const created = b.created_at ? new Date(b.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—';
      return `
        <tr id="row-${b.id}">
          <td style="color:var(--text-muted);font-size:11px">${idx}</td>
          <td class="td-name">${esc(b.name||'—')}</td>
          <td class="td-phone">${esc(b.phone||'—')}</td>
          <td class="td-service">${esc(b.service||'—')}</td>
          <td class="td-date">${b.date||'—'}</td>
          <td>${b.time||'—'}</td>
          <td class="td-notes" title="${esc(b.notes||'')}">${esc(b.notes||'—')}</td>
          <td><span class="badge badge-${status}">${status}</span></td>
          <td style="font-size:11px;color:var(--text-muted)">${created}</td>
          <td>
            <div class="actions">
              ${status !== 'confirmed' ? `<button class="act-btn act-confirm" onclick="updateStatus('${b.id}','confirmed')">✓ Подтвердить</button>` : ''}
              ${status !== 'cancelled' ? `<button class="act-btn act-cancel" onclick="updateStatus('${b.id}','cancelled')">✕ Отменить</button>` : ''}
              <button class="act-btn act-wa" onclick="openWA('${esc(b.phone||'')}','${esc(b.name||'')}')">WA</button>
              <button class="act-btn act-delete" onclick="confirmDelete('${b.id}','${esc(b.name||'')}')">Удалить</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    // pagination info
    document.getElementById('pagination-info').textContent = `Показано ${start+1}–${Math.min(start+PER_PAGE, filtered.length)} из ${filtered.length} записей`;

    // pagination buttons
    const pBtns = document.getElementById('pagination-btns');
    pBtns.innerHTML = '';
    const prev = document.createElement('button');
    prev.className = 'page-btn'; prev.textContent = '← Назад';
    prev.disabled = currentPage === 1;
    prev.onclick = () => { currentPage--; renderTable(); };
    pBtns.appendChild(prev);

    // show at most 5 page numbers
    const pageRange = getPageRange(currentPage, totalPages);
    pageRange.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { currentPage = p; renderTable(); };
      pBtns.appendChild(btn);
    });

    const next = document.createElement('button');
    next.className = 'page-btn'; next.textContent = 'Вперёд →';
    next.disabled = currentPage === totalPages;
    next.onclick = () => { currentPage++; renderTable(); };
    pBtns.appendChild(next);
  }

  function getPageRange(cur, total) {
    if (total <= 5) return Array.from({length: total}, (_, i) => i + 1);
    if (cur <= 3) return [1,2,3,4,5];
    if (cur >= total - 2) return [total-4,total-3,total-2,total-1,total];
    return [cur-2,cur-1,cur,cur+1,cur+2];
  }

  function setTableMsg(html) {
    document.getElementById('bookings-tbody').innerHTML = `<tr><td colspan="10"><div class="table-message">${html}</div></td></tr>`;
  }

  // ── UPDATE STATUS ─────────────────────────────────────────────────────
  async function updateStatus(id, status) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status })
      });
      if (!res.ok) throw new Error('Failed');

      // update local data
      const b = allBookings.find(b => b.id == id);
      if (b) b.status = status;
      applyFilters();
      updateStats();
      const statusRu = status === 'confirmed' ? 'подтверждён' : 'отменён';
      showToast(`Статус изменён: ${statusRu}`);
    } catch (e) {
      showToast('Ошибка обновления: ' + e.message);
    }
  }

  // ── DELETE ────────────────────────────────────────────────────────────
  let pendingDeleteId = null;
  function confirmDelete(id, name) {
    pendingDeleteId = id;
    document.getElementById('modal-body-text').textContent = `Удалить запись "${name}"? Это действие нельзя отменить.`;
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-confirm-btn').onclick = doDelete;
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    pendingDeleteId = null;
  }
  async function doDelete() {
    if (!pendingDeleteId) return;
    closeModal();
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${pendingDeleteId}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      if (!res.ok) throw new Error('Failed');
      allBookings = allBookings.filter(b => b.id != pendingDeleteId);
      applyFilters();
      updateStats();
      populateServiceFilter();
      showToast('Запись удалена');
    } catch (e) {
      showToast('Ошибка удаления: ' + e.message);
    }
  }

  // ── WHATSAPP ──────────────────────────────────────────────────────────
  function openWA(phone, name) {
    const cleaned = phone.replace(/\D/g,'');
    const num = cleaned.startsWith('996') ? cleaned : '996' + cleaned.replace(/^0/,'');
    const msg = encodeURIComponent(`Здравствуйте, ${name}! Это Sumbule Spa по поводу вашей записи.`);
    window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
  }

  // ── UTILS ─────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // load on start
  loadBookings();
</script>
</body>
</html>
